name: Build Mi 5 NetHunter lineageos22.2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ARCH: arm64
      SUBARCH: arm64

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev bison flex libelf-dev
        sudo apt-get install -y unzip p7zip-full wget git libgmp-dev libmpfr-dev libmpc-dev
        sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi curl zip

    - name: Clone Kernel Source
      run: |
        # Menggunakan branch 22.2 sesuai dengan ROM di HP Anda
        git clone --depth=1 -b lineage-22.2 https://github.com/LineageOS/android_kernel_xiaomi_msm8996.git kernel_workspace

    - name: Setup Neutron Clang
      run: |
        mkdir -p $GITHUB_WORKSPACE/clang
        cd $GITHUB_WORKSPACE/clang
        curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
        chmod +x antman
        ./antman -S
        ./antman --patch=glibc
        echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

    - name: Clone External Driver RTL8188EUS (TP-Link)
      run: |
        cd kernel_workspace
        git clone https://github.com/aircrack-ng/rtl8188eus.git drivers/net/wireless/rtl8188eus
        echo "obj-\$(CONFIG_RTL8188EU) += rtl8188eus/" >> drivers/net/wireless/Makefile
        echo 'source "drivers/net/wireless/rtl8188eus/Kconfig"' >> drivers/net/wireless/Kconfig

    - name: Configure & Inject NetHunter Features
      run: |
        cd kernel_workspace
        # Mematikan LLVM_IAS untuk mencegah error assembly di kernel 4.4
        export CLANG_ARGS="CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=0"
        
        # =========================================================================
        # FIX ERROR COMPILER (CAMERA, BT, MHI, NFC)
        # =========================================================================
        sed -i 's|<msm_camera_tz_util.h>|"msm_camera_tz_util.h"|g' drivers/media/platform/msm/camera_v2/common/cam_smmu_api.c
        sed -i 's|<mhi_sys.h>|"mhi_sys.h"|g' drivers/platform/msm/mhi/mhi_ssr.c
        sed -i 's|<mhi.h>|"mhi.h"|g' drivers/platform/msm/mhi/mhi_ssr.c
        sed -i '/apq8096-v3-pmi8996-mdm9x55-i2s-mtp.dtb/d' arch/arm64/boot/dts/qcom/Makefile
        sed -i 's|<btfm_slim.h>|"btfm_slim.h"|g' drivers/bluetooth/*.[ch]
        sed -i 's|<btfm_slim_wcn3990.h>|"btfm_slim_wcn3990.h"|g' drivers/bluetooth/*.[ch]
        sed -i 's|<btfm_slim.h>|"btfm_slim.h"|g' drivers/bluetooth/btfm_slim_codec.c
        sed -i 's/spin_lock_init(&hu->rx_lock);/\/\/ spin_lock_init(\&hu->rx_lock);/g' drivers/bluetooth/hci_ldisc.c
        sed -i 's|<pn548.h>|"pn548.h"|g' drivers/nfc/pn548/pn548.c
        
        # Fix RTL8188EUS untuk Android 15
        sed -i 's/IEEE80211_BAND_60GHZ/NL80211_BAND_60GHZ/g' net/mac80211/*.c
        sed -i 's/IEEE80211_BAND_2GHZ/NL80211_BAND_2GHZ/g' drivers/net/wireless/ath/regd.c
        sed -i 's/IEEE80211_BAND_2GHZ/NL80211_BAND_2GHZ/g' drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.c
        sed -i 's/IEEE80211_BAND_5GHZ/NL80211_BAND_5GHZ/g' drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.c
        sed -i 's/IEEE80211_NUM_BANDS/(NL80211_BAND_60GHZ + 1)/g' drivers/net/wireless/rtl8188eus/os_dep/linux/wifi_regd.c
        sed -i '/#define NL80211_BAND_2GHZ/d' drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.h
        sed -i '/#define NL80211_BAND_5GHZ/d' drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.h
        sed -i '/#define NUM_NL80211_BANDS/d' drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.h

        # =========================================================================
        # INJEKSI BYPASS QUALCOMM QCACLD-2.0 MONITOR MODE (HASIL OBSERVASI)
        # =========================================================================
        sed -i 's/pAdapter->device_mode == WLAN_HDD_INFRA_STATION/pAdapter->device_mode == WLAN_HDD_INFRA_STATION || pAdapter->device_mode == WLAN_HDD_MONITOR/g' drivers/staging/qcacld-2.0/CORE/HDD/src/wlan_hdd_cfg80211.c
        sed -i 's/pAdapter->device_mode == WLAN_HDD_INFRA_STATION/pAdapter->device_mode == WLAN_HDD_INFRA_STATION || pAdapter->device_mode == WLAN_HDD_MONITOR/g' drivers/staging/qcacld-2.0/CORE/HDD/src/wlan_hdd_main.c
        sed -i '/case NL80211_IFTYPE_AP:/i \        case NL80211_IFTYPE_MONITOR:\n            wdev->iftype = type;\n            pAdapter->device_mode = WLAN_HDD_MONITOR;\n            goto done;' drivers/staging/qcacld-2.0/CORE/HDD/src/wlan_hdd_cfg80211.c
        sed -i '/if (WLAN_HDD_IS_NDI(pAdapter))/i \    if (pAdapter->device_mode == WLAN_HDD_MONITOR) return 0;' drivers/staging/qcacld-2.0/CORE/HDD/src/wlan_hdd_main.c

        # =========================================================================
        # MERGE DEFCONFIG (BASE + GEMINI)
        # =========================================================================
        make $CLANG_ARGS vendor/xiaomi/mi8996_defconfig
        cat arch/arm64/configs/vendor/xiaomi/gemini.config >> .config
        make $CLANG_ARGS olddefconfig

        # =========================================================================
        # INJEKSI FITUR NETHUNTER KERNEL 4.4
        # =========================================================================
        ./scripts/config --enable CONFIG_PACKET
        ./scripts/config --enable CONFIG_USB_GADGET
        ./scripts/config --enable CONFIG_USB_CONFIGFS
        ./scripts/config --enable CONFIG_USB_CONFIGFS_F_HID
        ./scripts/config --enable CONFIG_USB_CONFIGFS_RNDIS
        ./scripts/config --enable CONFIG_USB_CONFIGFS_MASS_STORAGE
        ./scripts/config --enable CONFIG_TUN
        ./scripts/config --enable CONFIG_MODULES
        ./scripts/config --enable CONFIG_MODULE_UNLOAD

        # Kebutuhan Driver Eksternal (TP-Link RTL8188EUS)
        ./scripts/config --enable CONFIG_WIRELESS
        ./scripts/config --enable CONFIG_CFG80211
        ./scripts/config --enable CONFIG_MAC80211
        ./scripts/config --set-val CONFIG_RTL8188EU m

        make $CLANG_ARGS olddefconfig

    - name: Compile Kernel
      run: |
        cd kernel_workspace
        export CLANG_ARGS="CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=0"
        export KCFLAGS="-I$GITHUB_WORKSPACE/kernel_workspace/drivers/gpu/msm -I$GITHUB_WORKSPACE/kernel_workspace/drivers/soc/qcom -I$GITHUB_WORKSPACE/kernel_workspace/sound/soc/msm/qdsp6v2 -I$GITHUB_WORKSPACE/kernel_workspace/drivers/media/platform/msm/camera_v2/isp -I$GITHUB_WORKSPACE/kernel_workspace/drivers/misc -I."
        
        # Build Kernel
        make $CLANG_ARGS KCFLAGS="$KCFLAGS" -j$(nproc)
        
        # Build Modules
        make $CLANG_ARGS KCFLAGS="$KCFLAGS" -j$(nproc) modules

    - name: Package with AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git anykernel
        
        # Menyalin Kernel Image
        if [ -f kernel_workspace/arch/arm64/boot/Image.gz-dtb ]; then
          cp kernel_workspace/arch/arm64/boot/Image.gz-dtb anykernel/
        elif [ -f kernel_workspace/arch/arm64/boot/Image.gz ]; then
          cp kernel_workspace/arch/arm64/boot/Image.gz anykernel/
        else
          echo "Kernel Image tidak ditemukan!"
          exit 1
        fi
        
        # Menyalin Modul Eksternal TP-Link jika berhasil di-build
        mkdir -p anykernel/modules/system/lib/modules
        find kernel_workspace -name "8188eu.ko" -exec cp {} anykernel/modules/system/lib/modules/ \;
        
        # Konfigurasi AnyKernel
        cd anykernel
        sed -i 's/kernel.string=ExampleKernel by osm0sis @ xda-developers/kernel.string=NetHunter Kernel for Mi 5/' anykernel.sh
        sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
        sed -i 's/block=\/dev\/block\/platform\/omap\/omap_hsmmc.0\/by-name\/boot;/block=\/dev\/block\/bootdevice\/by-name\/boot;/' anykernel.sh
        
        # Pembersihan folder bawaan AK3
        rm -rf ramdisk patch
        
        # Zip Output
        zip -r9 ../NetHunter-Kernel-Mi5-Lineage22.2.zip * -x .git README.md *placeholder

    - name: Upload AnyKernel3 ZIP
      uses: actions/upload-artifact@v4
      with:
        name: NetHunter-Kernel-Mi5
        path: NetHunter-Kernel-Mi5-Lineage22.2.zip
