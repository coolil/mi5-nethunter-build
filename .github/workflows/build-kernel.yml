name: Build Mi 5 NetHunter Kernel Super + KernelSU - TAHAP 38 FIX ISP HEADER

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
      SUBARCH: arm64

    steps:
    - name: Clone Kernel Source
      run: |
        git clone --depth=1 -b twelve-4.4-inline https://github.com/B--B/Gemini-B--B-Kernel.git .

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev bison flex libelf-dev \
                                gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi unzip p7zip-full wget git

    - name: Integrate KernelSU
      run: |
        git clone https://github.com/tiann/KernelSU.git drivers/kernelsu
        echo 'source "drivers/kernelsu/kernel/Kconfig"' > drivers/kernelsu/Kconfig
        echo 'obj-y += kernel/' > drivers/kernelsu/Makefile
        echo "obj-y += kernelsu/" >> drivers/Makefile

    - name: Clone External Driver RTL8188EUS
      run: |
        git clone https://github.com/aircrack-ng/rtl8188eus.git drivers/net/wireless/rtl8188eus
        echo "obj-\$(CONFIG_RTL8188EU) += rtl8188eus/" >> drivers/net/wireless/Makefile
        echo 'source "drivers/net/wireless/rtl8188eus/Kconfig"' >> drivers/net/wireless/Kconfig

    - name: Configure & Inject NetHunter Features
      run: |
        make CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- gemini_defconfig
        ./scripts/config --disable CONFIG_LTO_CLANG --disable CONFIG_INPUT_DRV2604
        ./scripts/config --enable CONFIG_KERNELSU --enable CONFIG_KPROBES --enable CONFIG_KPROBE_EVENTS
        ./scripts/config --disable CONFIG_BPF_EVENTS --disable CONFIG_BPF_SYSCALL
        ./scripts/config --enable CONFIG_USB_GADGET --enable CONFIG_USB_CONFIGFS \
                         --enable CONFIG_USB_CONFIGFS_F_HID --enable CONFIG_USB_CONFIGFS_F_MASS_STORAGE \
                         --enable CONFIG_PACKET --enable CONFIG_NETFILTER
        ./scripts/config --enable CONFIG_WIRELESS --enable CONFIG_CFG80211 --enable CONFIG_MAC80211 \
                         --enable CONFIG_MAC80211_MESH --enable CONFIG_WLAN --disable CONFIG_PRIMA_WLAN_MONITOR \
                         --enable CONFIG_CNSS --set-val CONFIG_QCA_CLD_WLAN y --set-val CONFIG_WLAN_FEATURE_11W y

        # Patching Driver & Kode
        sed -i 's/IEEE80211_BAND_60GHZ/NL80211_BAND_60GHZ/g' net/mac80211/*.c
        
        # Bypass Qualcomm Monitor Mode
        sed -i 's/if ((pAdapter->device_mode == WLAN_HDD_INFRA_STATION) ||/if ((pAdapter->device_mode == WLAN_HDD_INFRA_STATION) || (pAdapter->device_mode == WLAN_HDD_MONITOR) ||/g' drivers/staging/qcacld-2.0/CORE/HDD/src/wlan_hdd_cfg80211.c
        sed -i '/case NL80211_IFTYPE_AP:/i \        case NL80211_IFTYPE_MONITOR: wdev->iftype = type; pAdapter->device_mode = WLAN_HDD_MONITOR; goto done;' drivers/staging/qcacld-2.0/CORE/HDD/src/wlan_hdd_cfg80211.c
        sed -i '/bool hdd_wext_is_connected/i static int hdd_set_wextmode(struct net_device *dev, struct iw_request_info *info, union iwreq_data *wrqu, char *extra) { hdd_adapter_t *adapter = (hdd_adapter_t *)netdev_priv(dev); if (wrqu->mode == 6) { adapter->device_mode = WLAN_HDD_MONITOR; return 0; } return -EOPNOTSUPP; }\nstatic int hdd_get_wextmode(struct net_device *dev, struct iw_request_info *info, union iwreq_data *wrqu, char *extra) { hdd_adapter_t *adapter = (hdd_adapter_t *)netdev_priv(dev); if (adapter->device_mode == WLAN_HDD_MONITOR) wrqu->mode = 6; else wrqu->mode = 2; return 0; }\n' drivers/staging/qcacld-2.0/CORE/HDD/src/wlan_hdd_wext.c
        sed -i 's/if (WLAN_HDD_IS_STA(pAdapter))/if (WLAN_HDD_IS_STA(pAdapter) || pAdapter->device_mode == WLAN_HDD_MONITOR)/g' drivers/staging/qcacld-2.0/CORE/HDD/src/wlan_hdd_tx_rx.c

        # Patch Realtek
        sed -i '/#define NUM_NL80211_BANDS IEEE80211_NUM_BANDS/d' drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.h
        echo "#define rtw_band_to_nl80211_band_patched(band) (enum nl80211_band)(((band) == BAND_ON_5G) ? NL80211_BAND_5GHZ : NL80211_BAND_2GHZ)" >> drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.h

        # Fix Error Camera/ISP/NFC
        sed -i 's|#include <pn548.h>|#include "pn548.h"|g' drivers/nfc/pn548/pn548.c
        sed -i 's|#include <kgsl_device.h>|#include "kgsl_device.h"|g' drivers/gpu/msm/kgsl_events.c
        sed -i 's|#include <msm_camera_tz_util.h>|#include "msm_camera_tz_util.h"|g' drivers/media/platform/msm/camera_v2/common/cam_smmu_api.c
        sed -i 's/spin_lock_init(&hu->rx_lock);/mutex_init(\&hu->proto_lock);/g' drivers/bluetooth/hci_ldisc.c
        
        # [SOLUSI ISP HEADER]
        ln -s $GITHUB_WORKSPACE/drivers/media/platform/msm/camera_v2/isp/msm_isp.h $GITHUB_WORKSPACE/include/linux/msm_isp.h || true
        
        make CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- olddefconfig
        make CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- prepare

    - name: Compile Kernel (Strict Mode)
      run: |
        export KCFLAGS="-I$GITHUB_WORKSPACE/drivers/gpu/msm -I$GITHUB_WORKSPACE/drivers/soc/qcom \
                        -I$GITHUB_WORKSPACE/drivers/media/platform/msm/camera_v2 \
                        -I$GITHUB_WORKSPACE/drivers/media/platform/msm/camera_v2/common \
                        -include linux/err.h -w -Wno-error -Wno-error=incompatible-pointer-types -I."
        make CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- KCFLAGS="$KCFLAGS" -j4

    - name: Package & Upload
      run: |
        mkdir output_bins
        cp arch/arm64/boot/Image.gz-dtb ./output_bins/ || cp arch/arm64/boot/Image.gz ./output_bins/
        cd output_bins && zip -r9 ../NetHunter-Kernel-Gemini-KernelSU.zip *
