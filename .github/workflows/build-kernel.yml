name: Build Mi 5 NetHunter Kernel Super - Tahap 12

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
      SUBARCH: arm64

    steps:
    - name: Clone Kernel Source
      run: |
        git clone --depth=1 -b twelve-4.4-inline https://github.com/B--B/Gemini-B--B-Kernel.git .

    - name: Install Dependencies & Toolchains
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev bison flex libelf-dev
        sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

    - name: Clone External Driver RTL8188EUS (TP-Link v2/v3)
      run: |
        git clone https://github.com/aircrack-ng/rtl8188eus.git drivers/net/wireless/rtl8188eus
        echo "obj-\$(CONFIG_RTL8188EU) += rtl8188eus/" >> drivers/net/wireless/Makefile
        echo 'source "drivers/net/wireless/rtl8188eus/Kconfig"' >> drivers/net/wireless/Kconfig

    - name: Configure & Inject NetHunter Features
      run: |
        # 1. Muat konfigurasi dasar HP
        make CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- gemini_defconfig
        
        # 2. Matikan LTO agar kompatibel dengan GCC bawaan GitHub
        ./scripts/config --disable CONFIG_LTO_CLANG

        # 3. Fitur Utama NetHunter & USB Gadget (HID / Mass Storage)
        ./scripts/config --enable CONFIG_USB_GADGET
        ./scripts/config --enable CONFIG_USB_CONFIGFS
        ./scripts/config --enable CONFIG_USB_CONFIGFS_F_HID
        ./scripts/config --enable CONFIG_USB_CONFIGFS_F_MASS_STORAGE
        ./scripts/config --enable CONFIG_PACKET
        ./scripts/config --enable CONFIG_NETFILTER
        
        # 4. Fondasi Wireless Mode Monitor & Injection
        ./scripts/config --enable CONFIG_WIRELESS
        ./scripts/config --enable CONFIG_CFG80211
        ./scripts/config --enable CONFIG_MAC80211
        ./scripts/config --enable CONFIG_MAC80211_LEDS
        ./scripts/config --enable CONFIG_WLAN
        
        # 5. Aktifkan Semua Driver Target (Dibuat Built-in '=y')
        ./scripts/config --set-val CONFIG_RTL8188EU y
        ./scripts/config --set-val CONFIG_ATH9K_HTC y
        ./scripts/config --set-val CONFIG_RT2800USB y
        ./scripts/config --set-val CONFIG_PRIMA_WLAN_MONITOR y
        
        # 6. PERBAIKAN KODE (FIX ERROR)
        # Fix Error MAC80211
        sed -i 's/IEEE80211_BAND_60GHZ/NL80211_BAND_60GHZ/g' net/mac80211/*.c
        
        # [PENJINAK REALTEK] Hapus makro bawaan rtw_band_to_nl80211_band yang memicu error tipe enum
        sed -i '/#define rtw_band_to_nl80211_band/d' drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.h
        sed -i 's/NUM_NL80211_BANDS/NL80211_BAND_2GHZ/g' drivers/net/wireless/rtl8188eus/os_dep/linux/*.c
        sed -i 's/NUM_NL80211_BANDS/NL80211_BAND_2GHZ/g' drivers/net/wireless/rtl8188eus/os_dep/linux/*.h
        
        # Suntik balik makro baru yang dibungkus dengan tipe data (enum nl80211_band) agar kompiler patuh
        echo '#define rtw_band_to_nl80211_band(band) (enum nl80211_band)(((band) == BAND_ON_5G) ? NL80211_BAND_5GHZ : NL80211_BAND_2GHZ)' >> drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.h
        
        # Fix Error KGSL GPU
        sed -i 's|#include <kgsl_device.h>|#include "kgsl_device.h"|g' drivers/gpu/msm/kgsl_events.c
        
        # Fix Error Kamera Common
        sed -i 's|#include <msm_camera_tz_util.h>|#include "msm_camera_tz_util.h"|g' drivers/media/platform/msm/camera_v2/common/cam_smmu_api.c
        
        # Fix Error Haptic Driver drv2604
        sed -i 's|#include <drv2604.h>|g; s|#include "drv2604.h"|g' drivers/misc/drv2604.c
        echo '#include "drv2604.h"' >> drivers/misc/drv2604.c
        
        # 7. SINKRONISASI OTOMATIS (Mengatasi Error in reading/end of file)
        make CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- olddefconfig

    - name: Compile Kernel (Strict Mode)
      run: |
        export KCFLAGS="-I$GITHUB_WORKSPACE/drivers/gpu/msm \
                        -I$GITHUB_WORKSPACE/drivers/soc/qcom \
                        -I$GITHUB_WORKSPACE/sound/soc/msm \
                        -I$GITHUB_WORKSPACE/sound/soc/msm/qdsp6v2 \
                        -I$GITHUB_WORKSPACE/drivers/media/platform/msm/camera_v2/isp \
                        -I$GITHUB_WORKSPACE/drivers/media/platform/msm/camera_v2/sensor \
                        -I$GITHUB_WORKSPACE/drivers/media/platform/msm/camera_v2/sensor/io \
                        -I$GITHUB_WORKSPACE/drivers/misc \
                        -I$GITHUB_WORKSPACE/drivers/net/ethernet/msm \
                        -I."
                        
        make CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- KCFLAGS="$KCFLAGS" -j2

    - name: Upload Kernel Result
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: NetHunter-Kernel-Mi5-Super
        path: arch/arm64/boot/Image.gz-dtb
