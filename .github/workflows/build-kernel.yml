name: Build Mi 5 NetHunter Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc ccache kmod git wget coreutils

    - name: Download Google Clang & GCC Toolchains
      run: |
        mkdir -p toolchains
        cd toolchains
        wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/android-11.0.0_r47/clang-r383902.tar.gz
        mkdir -p clang && tar -xf clang-r383902.tar.gz -C clang
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git -b lineage-17.1 gcc64
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git -b lineage-17.1 gcc32

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 https://github.com/B--B/Gemini-B--B-Kernel.git -b twelve-4.4-inline kernel-source

    - name: Configure Kernel with NetHunter Features
      run: |
        cd kernel-source
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$GITHUB_WORKSPACE/toolchains/clang/bin:$GITHUB_WORKSPACE/toolchains/gcc64/bin:$GITHUB_WORKSPACE/toolchains/gcc32/bin:$PATH
        
        make gemini_defconfig CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi-
        
        # Suntikkan fitur NetHunter
        echo "CONFIG_WIRELESS=y" >> .config
        echo "CONFIG_CFG80211=y" >> .config
        echo "CONFIG_NL80211_TESTMODE=y" >> .config
        echo "CONFIG_CFG80211_WEXT=y" >> .config
        echo "CONFIG_MAC80211=y" >> .config
        echo "CONFIG_WLAN_VENDOR_REALTEK=y" >> .config
        echo "CONFIG_RTL8188EU=y" >> .config
        echo "CONFIG_RTLWIFI=y" >> .config
        echo "CONFIG_USB_GADGET=y" >> .config
        echo "CONFIG_USB_G_HID=y" >> .config
        echo "CONFIG_USB_F_HID=y" >> .config
        echo "CONFIG_TUN=y" >> .config
        
        make olddefconfig CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi-

    - name: Compile Kernel
      run: |
        cd kernel-source
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$GITHUB_WORKSPACE/toolchains/clang/bin:$GITHUB_WORKSPACE/toolchains/gcc64/bin:$GITHUB_WORKSPACE/toolchains/gcc32/bin:$PATH
        
        # KCFLAGS="-w" digunakan untuk menyembunyikan warning keras dari Clang yang bisa memicu 'Error 2'
        make -j$(nproc) CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi- KCFLAGS="-w"

    - name: Upload Kernel Image Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mi5-NetHunter-Kernel-Image
        path: kernel-source/arch/arm64/boot/Image.gz-dtb
