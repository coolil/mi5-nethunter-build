name: Build Mi 5 NetHunter Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
      SUBARCH: arm64

    steps:
    - name: Clone Kernel Source
      run: |
        # Mengunduh langsung source kernel Mi 5 khusus Android 12 (branch twelve-4.4-inline)
        git clone --depth=1 -b twelve-4.4-inline https://github.com/B--B/Gemini-B--B-Kernel.git .

    - name: Install Dependencies & Toolchains
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev bison flex libelf-dev
        sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

    - name: Configure & Inject NetHunter Features
      run: |
        # 1. Muat defconfig bawaan Mi 5 (gemini)
        make CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- gemini_defconfig
        
        # 2. Matikan LTO Clang agar tidak eror saat di-compile dengan GCC bawaan GitHub
        ./scripts/config --disable CONFIG_LTO_CLANG
        
        # 3. Suntik Fitur NetHunter (USB Gadget, HID, Wi-Fi Injection)
        ./scripts/config --enable CONFIG_USB_GADGET
        ./scripts/config --enable CONFIG_USB_CONFIGFS
        ./scripts/config --enable CONFIG_USB_CONFIGFS_F_HID
        ./scripts/config --enable CONFIG_PACKET
        ./scripts/config --enable CONFIG_NETFILTER
        ./scripts/config --enable CONFIG_NETFILTER_XT_TARGET_TTL
        ./scripts/config --enable CONFIG_WIRELESS
        ./scripts/config --enable CONFIG_CFG80211
        ./scripts/config --enable CONFIG_MAC80211
        ./scripts/config --enable CONFIG_MAC80211_LEDS
        ./scripts/config --enable CONFIG_WLAN
        
        # 4. FIX ERROR MAC80211: Memperbaiki mlme.c dan tx.c sekaligus berdasarkan cek grep lokal
        sed -i 's/IEEE80211_BAND_60GHZ/NL80211_BAND_60GHZ/g' net/mac80211/*.c
        
        # 5. Sinkronisasi konfigurasi agar semua fitur terkunci di file .config
        make CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- olddefconfig

    - name: Compile Kernel
      run: |
        # JALUR SAPU JAGAT V2: Mencari seluruh sub-folder sensitif secara otomatis (termasuk nfc)
        EXTRA_PATHS=$(find drivers/gpu/msm sound/soc/msm drivers/media/platform/msm drivers/net drivers/misc drivers/nfc -type d 2>/dev/null | sed "s/^/-I\${PWD}\//")
        
        # Ditambahkan "-I." di ujung agar makro trace (seperti rndis_ipa_trace.h) bisa dibaca secara lokal oleh GCC
        export KCFLAGS="$EXTRA_PATHS -I."
        
        make CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- KCFLAGS="$KCFLAGS" -j$(nproc)

    - name: Upload Kernel Result
      uses: actions/upload-artifact@v4
      with:
        name: NetHunter-Kernel-Mi5
        path: arch/arm64/boot/Image.gz-dtb
