name: Build Mi 5 NetHunter Kernel Super - Tahap 32 RAW FIXED

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
      SUBARCH: arm64

    steps:
    - name: Clone Kernel Source
      run: |
        git clone --depth=1 -b twelve-4.4-inline https://github.com/B--B/Gemini-B--B-Kernel.git .

    - name: Install Dependencies & Toolchains
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev bison flex libelf-dev
        sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi unzip p7zip-full wget

    - name: Clone External Driver RTL8188EUS (TP-Link v2/v3)
      run: |
        git clone https://github.com/aircrack-ng/rtl8188eus.git drivers/net/wireless/rtl8188eus
        echo "obj-\$(CONFIG_RTL8188EU) += rtl8188eus/" >> drivers/net/wireless/Makefile
        echo 'source "drivers/net/wireless/rtl8188eus/Kconfig"' >> drivers/net/wireless/Kconfig

    - name: Configure & Inject NetHunter Features
      run: |
        # 1. Muat konfigurasi dasar HP (Xiaomi Mi 5 - gemini)
        make CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- gemini_defconfig
        
        # 2. Matikan LTO agar kompatibel dengan GCC bawaan GitHub
        ./scripts/config --disable CONFIG_LTO_CLANG
        ./scripts/config --disable CONFIG_INPUT_DRV2604

        # 3. Fitur Utama NetHunter & USB Gadget (FONDASI HID / BADUSB)
        ./scripts/config --enable CONFIG_USB_GADGET
        ./scripts/config --enable CONFIG_USB_CONFIGFS
        ./scripts/config --enable CONFIG_USB_CONFIGFS_F_HID
        ./scripts/config --enable CONFIG_USB_CONFIGFS_F_MASS_STORAGE
        ./scripts/config --set-val CONFIG_USB_F_HID_NUM_COMP_COMMANDS 4
        ./scripts/config --enable CONFIG_PACKET
        ./scripts/config --enable CONFIG_NETFILTER
        
        # 4. Fondasi Wireless Mode Monitor & Injection
        ./scripts/config --enable CONFIG_USB_NET_RNDIS_WLAN
        ./scripts/config --enable CONFIG_WIRELESS
        ./scripts/config --enable CONFIG_CFG80211
        ./scripts/config --enable CONFIG_MAC80211
        ./scripts/config --enable CONFIG_MAC80211_LEDS
        ./scripts/config --enable CONFIG_WLAN
        
        # [FONDASI BLUETOOTH UNTUK NETHUNTER CHROOT]
        ./scripts/config --enable CONFIG_BT
        ./scripts/config --enable CONFIG_BT_RFCOMM
        ./scripts/config --enable CONFIG_BT_RFCOMM_TTY
        ./scripts/config --enable CONFIG_BT_BNEP
        ./scripts/config --enable CONFIG_BT_BNEP_MC_FILTER
        ./scripts/config --enable CONFIG_BT_BNEP_PROTO_FILTER
        ./scripts/config --enable CONFIG_BT_HIDP
        ./scripts/config --enable CONFIG_BT_HCIUART
        ./scripts/config --enable CONFIG_BT_HCIUART_H4
        ./scripts/config --enable CONFIG_BT_HCIUART_IBS
        
        # 5. Aktifkan Semua Driver Target (Dibuat Built-in '=y')
        ./scripts/config --set-val CONFIG_RTL8188EU y
        ./scripts/config --set-val CONFIG_ATH9K_HTC y
        ./scripts/config --set-val CONFIG_RT2800USB y
        
        # FIX WIFI INTERNAL MI 5 (Memaksa QCA CLD Built-in, Hapus Prima)
        ./scripts/config --disable CONFIG_PRIMA_WLAN_MONITOR
        ./scripts/config --enable CONFIG_CNSS
        ./scripts/config --set-val CONFIG_QCA_CLD_WLAN y
        ./scripts/config --set-val CONFIG_WLAN_FEATURE_11W y
        
        # 6. PERBAIKAN KODE DRIVER (BERDASARKAN RISET LOG & SUMBER LUAR)
        # Fix Error MAC80211
        sed -i 's/IEEE80211_BAND_60GHZ/NL80211_BAND_60GHZ/g' net/mac80211/*.c

        # [INJEKSI BYPASS QUALCOMM QCACLD MONITOR MODE - SAKTI TAHAP 32 FIXED]
        # A. Loloskan status WLAN_HDD_MONITOR pada kondisi IF utama agar tidak diblokir di awal
        sed -i 's/if ((pAdapter->device_mode == WLAN_HDD_INFRA_STATION) ||/if ((pAdapter->device_mode == WLAN_HDD_INFRA_STATION) || (pAdapter->device_mode == WLAN_HDD_MONITOR) ||/g' drivers/staging/qcacld-2.0/CORE/HDD/src/wlan_hdd_cfg80211.c

        # B. MENEMPATKAN CASE MONITOR TEPAT DI ATAS DEFAULT AGAR TIDAK TERJEBAK IF CONDITION STATION
        sed -i '/   case NL80211_IFTYPE_AP:/i \        case NL80211_IFTYPE_MONITOR:\n           wdev->iftype = type;\n           pAdapter->device_mode = WLAN_HDD_MONITOR;\n           hddLog(LOG1, "NetHunter: Core Bypass Success! Mode set to MONITOR");\n           goto done;\n' drivers/staging/qcacld-2.0/CORE/HDD/src/wlan_hdd_cfg80211.c
        
        # =========================================================================
        # INJEKSI TINGKAT DEWA: FIX INTERFACE LENYAP & IOCTL WEXT HANDLER (QCACLD-2.0)
        # =========================================================================
        
        # C. TAMENG PROTEKSI INTERFACE DI __hdd_stop (Mencegah Eksekusi hdd_cleanup_adapter)
        # Mencari penanda proteksi interface NAN (NDI) milik Qualcomm, lalu menyisipkan tameng Monitor Mode tepat di bawahnya
        sed -i '/if (WLAN_HDD_IS_NDI(pAdapter))/a \   if (pAdapter->device_mode == WLAN_HDD_MONITOR) {\n      pr_info("NetHunter_Engine: Monitor Mode active. Bypassing BSS termination and adapter deletion.\\n");\n      return 0;\n   }' drivers/staging/qcacld-2.0/CORE/HDD/src/wlan_hdd_main.c

        # D. SUNTIKKAN FUNGSI HANDLER KUSTOM DI ATAS ARRAY we_handler PADA wlan_hdd_wext.c
        # Kita buat fungsi set/get mode secara legal agar airodump-ng mendapatkan respon valid (IW_MODE_MONITOR = 6)
        sed -i '/static const iw_handler      we_handler\[\] =/i \
        static int hdd_set_wextmode(struct net_device *dev, struct iw_request_info *info, union iwreq_data *wrqu, char *extra) {\n\
           hdd_adapter_t *adapter = netdev_priv(dev);\n\
           if (wrqu->mode == 6) {\n\
               adapter->device_mode = WLAN_HDD_MONITOR;\n\
               pr_info("NetHunter_Fix: Forced adapter->device_mode to WLAN_HDD_MONITOR via WEXT ioctl\\n");\n\
               return 0;\n\
           }\n\
           return -EOPNOTSUPP;\n\
        }\n\
        static int hdd_get_wextmode(struct net_device *dev, struct iw_request_info *info, union iwreq_data *wrqu, char *extra) {\n\
           hdd_adapter_t *adapter = netdev_priv(dev);\n\
           if (adapter->device_mode == WLAN_HDD_MONITOR) wrqu->mode = 6;\n\
           else wrqu->mode = 2;\n\
           return 0;\n\
        }\n' drivers/staging/qcacld-2.0/CORE/HDD/src/wlan_hdd_wext.c

        # E. PASANG HANDLER KUSTOM KITA UNTUK MENGGANTIKAN "NULL" PADA SIOCSIWMODE & SIOCGIWMODE
        sed -i 's/(iw_handler) NULL,             \/\* SIOCSIWMODE \*\//(iw_handler) hdd_set_wextmode,             \/\* SIOCSIWMODE \*\//g' drivers/staging/qcacld-2.0/CORE/HDD/src/wlan_hdd_wext.c
        sed -i 's/(iw_handler) NULL,             \/\* SIOCGIWMODE \*\//(iw_handler) hdd_get_wextmode,             \/\* SIOCGIWMODE \*\//g' drivers/staging/qcacld-2.0/CORE/HDD/src/wlan_hdd_wext.c
        
        # =========================================================================

        # Perbaikan Driver Realtek Wi-Fi
        sed -i '/#define NUM_NL80211_BANDS IEEE80211_NUM_BANDS/d' drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.h
        sed -i 's/#define NL80211_BAND_2GHZ IEEE80211_BAND_2GHZ/#define IEEE80211_BAND_2GHZ NL80211_BAND_2GHZ/g' drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.h
        sed -i 's/#define NL80211_BAND_5GHZ IEEE80211_BAND_5GHZ/#define IEEE80211_BAND_5GHZ NL80211_BAND_5GHZ/g' drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.h
        sed -i 's/rtw_band_to_nl80211_band(/rtw_band_to_nl80211_band_patched(/g' drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.c
        sed -i 's/NUM_NL80211_BANDS/NL80211_BAND_2GHZ/g' drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.c
        echo "" >> drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.h
        echo "#define rtw_band_to_nl80211_band_patched(band) (enum nl80211_band)(((band) == BAND_ON_5G) ? NL80211_BAND_5GHZ : NL80211_BAND_2GHZ)" >> drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.h
        
        # Amankan baris fitur sub-command Android modern yang tidak dikenal pada rtw_cfgvendor.h
        sed -i 's/GSCAN_SUBCMD_GET_CAPABILITIES/\/\/GSCAN_SUBCMD_GET_CAPABILITIES/g' drivers/net/wireless/rtl8188eus/include/../os_dep/linux/rtw_cfgvendor.h
        sed -i 's/RTT_SUBCMD_SET_CONFIG/\/\/RTT_SUBCMD_SET_CONFIG/g' drivers/net/wireless/rtl8188eus/include/../os_dep/linux/rtw_cfgvendor.h
        sed -i 's/APF_SUBCMD_GET_CAPABILITIES/\/\/APF_SUBCMD_GET_CAPABILITIES/g' drivers/net/wireless/rtl8188eus/include/../os_dep/linux/rtw_cfgvendor.h
        echo "ccflags-y += -w -Wno-implicit-int -Wno-error -Wno-int-conversion -Wno-mismatched-function-types" >> drivers/net/wireless/rtl8188eus/Makefile
        
        # Fix Error NFC Chip PN548
        sed -i 's|#include <pn548.h>|#include "pn548.h"|g' drivers/nfc/pn548/pn548.c

        # [SOLUSI UTAMA QUALCOMM IPA] Suntikkan include path lokal ke Makefile ipa_v2 agar compiler menemukan ipa_trace.h
        echo "ccflags-y += -I\$(src)" >> drivers/platform/msm/ipa/ipa_v2/Makefile

        # Fix Error KGSL GPU & Kamera Common
        sed -i 's|#include <kgsl_device.h>|#include "kgsl_device.h"|g' drivers/gpu/msm/kgsl_events.c
        sed -i 's|#include <msm_camera_tz_util.h>|#include "msm_camera_tz_util.h"|g' drivers/media/platform/msm/camera_v2/common/cam_smmu_api.c
        
        # [FIX BLUETOOTH ERRS] Menggunakan mutex_init karena proto_lock di kernel MSM8996 bertipe struct mutex
        sed -i 's/spin_lock_init(&hu->rx_lock);/mutex_init(\&hu->proto_lock);/g' drivers/bluetooth/hci_ldisc.c
        
        # 7. Sinkronisasi konfigurasi otomatis secara aman
        make CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- olddefconfig

    - name: Compile Kernel (Strict Mode)
      run: |
        export KCFLAGS="-I$GITHUB_WORKSPACE/drivers/gpu/msm \
                        -I$GITHUB_WORKSPACE/drivers/soc/qcom \
                        -I$GITHUB_WORKSPACE/sound/soc/msm \
                        -I$GITHUB_WORKSPACE/sound/soc/msm/qdsp6v2 \
                        -I$GITHUB_WORKSPACE/drivers/media/platform/msm/camera_v2/isp \
                        -I$GITHUB_WORKSPACE/drivers/media/platform/msm/camera_v2/sensor \
                        -I$GITHUB_WORKSPACE/drivers/media/platform/msm/camera_v2/sensor/io \
                        -I$GITHUB_WORKSPACE/drivers/misc \
                        -I$GITHUB_WORKSPACE/drivers/net/ethernet/msm \
                        -I."
                        
        make CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- KCFLAGS="$KCFLAGS" -j2

    - name: Package Raw Bins (No AnyKernel3)
      run: |
        mkdir output_bins
        # Menyalin file utama Image.gz-dtb
        cp arch/arm64/boot/Image.gz-dtb ./output_bins/
        
        # Bungkus ke zip biasa
        cd output_bins
        zip -r9 ../NetHunter-Kernel-Gemini-Raw-Files.zip *

    - name: Upload Raw Kernel Zip
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: NetHunter-Kernel-Mi5-Raw-Files
        path: NetHunter-Kernel-Gemini-Raw-Files.zip
