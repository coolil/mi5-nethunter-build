  build:
    runs-on: ubuntu-22.04
    env:
      ARCH: arm64
      SUBARCH: arm64
    steps:
      - name: Clone Kernel Source
        run: |
          git clone --depth=1 -b twelve-4.4-inline https://github.com/B--B/Gemini-B--B-Kernel.git .

      - name: Install Dependencies & Toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev bison flex libelf-dev unzip p7zip-full wget
          
          # Install GCC 9 khusus agar kernel 4.4 tidak bootloop di server baru
          sudo apt-get install -y gcc-9-aarch64-linux-gnu gcc-9-arm-linux-gnueabi
          
          # Paksa sistem menggunakan compiler GCC 9
          sudo ln -s -f /usr/bin/aarch64-linux-gnu-gcc-9 /usr/bin/aarch64-linux-gnu-gcc
          sudo ln -s -f /usr/bin/arm-linux-gnueabi-gcc-9 /usr/bin/arm-linux-gnueabi-gcc

      - name: Clone External Driver RTL8188EUS (TP-Link v2/v3)
        run: |
          git clone https://github.com/aircrack-ng/rtl8188eus.git drivers/net/wireless/rtl8188eus
          echo "obj-\$(CONFIG_RTL8188EU) += rtl8188eus/" >> drivers/net/wireless/Makefile
          echo 'source "drivers/net/wireless/rtl8188eus/Kconfig"' >> drivers/net/wireless/Kconfig

      - name: Configure & Inject NetHunter Features
        run: |
          # 1. Muat konfigurasi dasar HP (Xiaomi Mi 5 - gemini)
          make CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- gemini_defconfig
          
          # 2. Matikan LTO agar kompatibel dengan GCC bawaan GitHub
          ./scripts/config --disable CONFIG_LTO_CLANG
          ./scripts/config --disable CONFIG_INPUT_DRV2604
          
          # 3. Fitur Utama NetHunter & USB Gadget (FONDASI HID / BADUSB)
          ./scripts/config --enable CONFIG_USB_GADGET
          ./scripts/config --enable CONFIG_USB_CONFIGFS
          ./scripts/config --enable CONFIG_USB_CONFIGFS_F_HID
          ./scripts/config --enable CONFIG_USB_CONFIGFS_F_MASS_STORAGE
          ./scripts/config --set-val CONFIG_USB_F_HID_NUM_COMP_COMMANDS 4
          ./scripts/config --enable CONFIG_PACKET
          ./scripts/config --enable CONFIG_NETFILTER
          
          # 4. Fondasi Loadable Module Support (Manifes NetHunter)
          ./scripts/config --enable CONFIG_MODULES
          ./scripts/config --enable CONFIG_MODULE_UNLOAD
          ./scripts/config --enable CONFIG_MODULE_FORCE_UNLOAD
          ./scripts/config --enable CONFIG_MODVERSIONS
          
          # 5. Fondasi Wireless Mode Monitor & Injection
          ./scripts/config --enable CONFIG_USB_NET_RNDIS_WLAN
          ./scripts/config --enable CONFIG_WIRELESS
          ./scripts/config --enable CONFIG_CFG80211
          ./scripts/config --enable CONFIG_CFG80211_WEXT
          ./scripts/config --enable CONFIG_MAC80211
          ./scripts/config --enable CONFIG_MAC80211_LEDS
          ./scripts/config --enable CONFIG_MAC80211_MESH
          ./scripts/config --enable CONFIG_WLAN
          
          # [FONDASI BLUETOOTH UNTUK NETHUNTER CHROOT]
          ./scripts/config --enable CONFIG_BT
          ./scripts/config --enable CONFIG_BT_RFCOMM
          ./scripts/config --enable CONFIG_BT_RFCOMM_TTY
          ./scripts/config --enable CONFIG_BT_BNEP
          ./scripts/config --enable CONFIG_BT_BNEP_MC_FILTER
          ./scripts/config --enable CONFIG_BT_BNEP_PROTO_FILTER
          ./scripts/config --enable CONFIG_BT_HIDP
          ./scripts/config --enable CONFIG_BT_HCIUART
          ./scripts/config --enable CONFIG_BT_HCIUART_H4
          ./scripts/config --enable CONFIG_BT_HCIUART_IBS
          ./scripts/config --enable CONFIG_BT_HCIBTUSB
          ./scripts/config --enable CONFIG_BT_HCIBTUSB_BCM
          ./scripts/config --enable CONFIG_BT_HCIBTUSB_RTL
          ./scripts/config --enable CONFIG_BT_HCIBCM203X
          ./scripts/config --enable CONFIG_BT_HCIBPA10X
          ./scripts/config --enable CONFIG_BT_HCIBFUSB
          ./scripts/config --enable CONFIG_BT_HCIVHCI
          
          # 6. USB Network Adapters & Modems
          ./scripts/config --enable CONFIG_USB_NET_DRIVERS
          ./scripts/config --enable CONFIG_USB_RTL8150
          ./scripts/config --enable CONFIG_USB_RTL8152
          ./scripts/config --enable CONFIG_USB_ACM
          
          # 7. Aktifkan Semua Driver Target Wireless Eksternal
          ./scripts/config --enable CONFIG_WLAN_VENDOR_ATH
          ./scripts/config --set-val CONFIG_ATH9K_HTC y
          ./scripts/config --set-val CONFIG_CARL9170 y
          ./scripts/config --set-val CONFIG_ATH6KL y
          ./scripts/config --set-val CONFIG_ATH6KL_USB y
          ./scripts/config --enable CONFIG_WLAN_VENDOR_MEDIATEK
          ./scripts/config --set-val CONFIG_MT7601U y
          ./scripts/config --enable CONFIG_WLAN_VENDOR_RALINK
          ./scripts/config --set-val CONFIG_RT2X00 y
          ./scripts/config --set-val CONFIG_RT2500USB y
          ./scripts/config --set-val CONFIG_RT73USB y
          ./scripts/config --set-val CONFIG_RT2800USB y
          ./scripts/config --set-val CONFIG_RT2800USB_RT33XX y
          ./scripts/config --set-val CONFIG_RT2800USB_RT35XX y
          ./scripts/config --set-val CONFIG_RT2800USB_RT3573 y
          ./scripts/config --set-val CONFIG_RT2800USB_RT53XX y
          ./scripts/config --set-val CONFIG_RT2800USB_RT55XX y
          ./scripts/config --set-val CONFIG_RT2800USB_UNKNOWN y
          ./scripts/config --enable CONFIG_WLAN_VENDOR_REALTEK
          ./scripts/config --set-val CONFIG_RTL8188EU y
          ./scripts/config --set-val CONFIG_RTL8187 y
          ./scripts/config --set-val CONFIG_RTL_CARDS y
          ./scripts/config --set-val CONFIG_RTL8192CU y
          ./scripts/config --set-val CONFIG_RTL8XXXU_UNTESTED y
          ./scripts/config --enable CONFIG_WLAN_VENDOR_ZYDAS
          ./scripts/config --set-val CONFIG_USB_ZD1201 y
          ./scripts/config --set-val CONFIG_ZD1211RW y
          
          # === OPTIMASI WI-FI INTERNAL MI 5 ===
          ./scripts/config --enable CONFIG_CNSS
          ./scripts/config --set-val CONFIG_QCA_CLD_WLAN y
          ./scripts/config --set-val CONFIG_WLAN_FEATURE_11W y
          ./scripts/config --enable CONFIG_NL80211_TESTMODE
          ./scripts/config --enable CONFIG_CFG80211_INTERNAL_REGDB
          ./scripts/config --enable CONFIG_QCACLD_WLAN_LFR3
          
          # 8. Software Defined Radio (SDR) & TV Tuner
          ./scripts/config --enable CONFIG_MEDIA_SUPPORT
          ./scripts/config --enable CONFIG_MEDIA_DIGITAL_TV_SUPPORT
          ./scripts/config --enable CONFIG_MEDIA_SDR_SUPPORT
          ./scripts/config --enable CONFIG_MEDIA_USB_SUPPORT
          ./scripts/config --set-val CONFIG_USB_AIRSPY y
          ./scripts/config --set-val CONFIG_USB_HACKRF y
          ./scripts/config --set-val CONFIG_USB_MSI2500 y
          ./scripts/config --disable CONFIG_MEDIA_SUBDRV_AUTOSELECT
          ./scripts/config --set-val CONFIG_DVB_RTL2830 y
          ./scripts/config --set-val CONFIG_DVB_RTL2832 y
          ./scripts/config --set-val CONFIG_DVB_RTL2832_SDR y
          ./scripts/config --set-val CONFIG_DVB_SI2168 y
          ./scripts/config --set-val CONFIG_DVB_ZD1301_DEMOD y
          
          # === OPTIMASI PERFORMA & RAM MI 5 (SD820) ===
          ./scripts/config --enable CONFIG_ZSMALLOC
          ./scripts/config --enable CONFIG_ZRAM
          ./scripts/config --enable CONFIG_CRYPTO_LZ4
          ./scripts/config --enable CONFIG_ZRAM_LZ4_COMPRESS
          ./scripts/config --enable CONFIG_TCP_CONG_BBR
          ./scripts/config --set-str CONFIG_DEFAULT_TCP_CONG "bbr"
          ./scripts/config --enable CONFIG_IOSCHED_BFQ
          ./scripts/config --enable CONFIG_CGROUP_BFQIO
          
          # === FIX ERROR COMPILE BPF TRACE KERNEL 4.4 ===
          ./scripts/config --disable CONFIG_BPF_SYSCALL
          ./scripts/config --disable CONFIG_BPF_EVENTS
          ./scripts/config --disable CONFIG_BPF_JIT
          ./scripts/config --disable CONFIG_UPROBE_EVENTS
          
          # 10. Sinkronisasi konfigurasi
          make CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- olddefconfig

      - name: Apply Kernel & Driver Patches
        run: |
          echo "=== Applying Driver Patches ==="
          
          # 1. Fix MAC80211
          find net/mac80211 -name "*.c" -exec sed -i 's/IEEE80211_BAND_60GHZ/NL80211_BAND_60GHZ/g' {} + 2>/dev/null || true
          
          # 2. SELESAIKAN RESTRIKSI QCACLD MONITOR MODE (Hasil Observasi Terminal)
          CFG_FILE="drivers/staging/qcacld-2.0/CORE/HDD/src/wlan_hdd_cfg80211.c"
          WEXT_FILE="drivers/staging/qcacld-2.0/CORE/HDD/src/wlan_hdd_wext.c"
          
          if [ -f "$CFG_FILE" ]; then
            echo "[PATCH] Kebiri Pengunci Switch Mode..."
            sed -i 's/case NL80211_IFTYPE_AP:/case NL80211_IFTYPE_MONITOR:\n        pAdapter->device_mode = WLAN_HDD_MONITOR;\n        case NL80211_IFTYPE_AP:/g' $CFG_FILE
            sed -i 's/wdev->iftype = type;/wdev->iftype = type;\n           if(type == NL80211_IFTYPE_MONITOR) { pAdapter->device_mode = WLAN_HDD_MONITOR; }/g' $CFG_FILE
          fi
          
          if [ -f "$WEXT_FILE" ]; then
            echo "[PATCH] Bypass Pengunci Frekuensi & Channel Lock..."
            sed -i 's/if (VOS_MONITOR_MODE != hdd_get_conparam())/if (1) \/* Bypass Monitor Conparam *\/ /g' $WEXT_FILE
            sed -i 's/if (VOS_MONITOR_MODE == hdd_get_conparam())/if (1) \/* Bypass Monitor Channel Lock *\/ /g' $WEXT_FILE
          fi
          
          # 3. Realtek RTL8188EUS Patches
          if [ -d "drivers/net/wireless/rtl8188eus" ]; then
            echo "[PATCH] Fixing Realtek RTL8188EUS..."
            sed -i '/#define NUM_NL80211_BANDS IEEE80211_NUM_BANDS/d' drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.h 2>/dev/null || true
            sed -i 's/#define NL80211_BAND_2GHZ IEEE80211_BAND_2GHZ/#define IEEE80211_BAND_2GHZ NL80211_BAND_2GHZ/g' drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.h 2>/dev/null || true
            sed -i 's/#define NL80211_BAND_5GHZ IEEE80211_BAND_5GHZ/#define IEEE80211_BAND_5GHZ NL80211_BAND_5GHZ/g' drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.h 2>/dev/null || true
            sed -i 's/rtw_band_to_nl80211_band(/rtw_band_to_nl80211_band_patched(/g' drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.c 2>/dev/null || true
            echo -e "\n#define rtw_band_to_nl80211_band_patched(band) (enum nl80211_band)(((band) == BAND_ON_5G) ? NL80211_BAND_5GHZ : NL80211_BAND_2GHZ)" >> drivers/net/wireless/rtl8188eus/os_dep/linux/ioctl_cfg80211.h
            echo "ccflags-y += -w -Wno-implicit-int -Wno-error -Wno-int-conversion" >> drivers/net/wireless/rtl8188eus/Makefile
          fi
          
          # 4. FIX ERROR BLUETOOTH (hci_ldisc.c)
          echo "[PATCH] Fixing Bluetooth UART rx_lock..."
          sed -i 's/spin_lock_init(&hu->rx_lock);/mutex_init(\&hu->proto_lock);/g' drivers/bluetooth/hci_ldisc.c 2>/dev/null || true
          
          # 5. FIX ERROR QUALCOMM IPA & GPU/CAMERA
          echo "[PATCH] Fixing Qualcomm IPA & SMMU Headers..."
          echo "ccflags-y += -I\$(src)" >> drivers/platform/msm/ipa/ipa_v2/Makefile
          sed -i 's|#include <kgsl_device.h>|#include "kgsl_device.h"|g' drivers/gpu/msm/kgsl_events.c 2>/dev/null || true
          sed -i 's|#include <msm_camera_tz_util.h>|#include "msm_camera_tz_util.h"|g' drivers/media/platform/msm/camera_v2/common/cam_smmu_api.c 2>/dev/null || true
          
          # 6. Other Driver Fixes (NFC & BPF)
          if [ -f "drivers/nfc/pn548/pn548.c" ]; then
            sed -i 's|#include <pn548.h>|#include "pn548.h"|g' drivers/nfc/pn548/pn548.c 2>/dev/null || true
          fi
          if [ -f "include/linux/bpf.h" ]; then
            sed -i '1s/^/#include <linux\/err.h>\n/' include/linux/bpf.h 2>/dev/null || true
          fi
          
          # 7. Trace Include Fix
          if [ -f "include/trace/events/msm_cam.h" ]; then
            sed -i 's|#include "msm_isp.h"|#include "../../../drivers/media/platform/msm/camera_v2/isp/msm_isp.h"|g' include/trace/events/msm_cam.h 2>/dev/null || true
          fi
          
          echo "[✓] All custom patches applied"

      - name: Compile Kernel (Optimized Mode)
        run: |
          echo "=== Starting Kernel Compilation ==="
          
          export KCFLAGS="-I$GITHUB_WORKSPACE/drivers/gpu/msm \
            -I$GITHUB_WORKSPACE/drivers/soc/qcom \
            -I$GITHUB_WORKSPACE/sound/soc/msm \
            -I$GITHUB_WORKSPACE/sound/soc/msm/qdsp6v2 \
            -I$GITHUB_WORKSPACE/drivers/media/platform/msm/camera_v2/isp \
            -I$GITHUB_WORKSPACE/drivers/media/platform/msm/camera_v2/sensor \
            -I$GITHUB_WORKSPACE/drivers/media/platform/msm/camera_v2/sensor/io \
            -I$GITHUB_WORKSPACE/drivers/misc \
            -I$GITHUB_WORKSPACE/drivers/net/ethernet/msm \
            -I$GITHUB_WORKSPACE/include \
            -I. \
            -Wno-error=stringop-overflow \
            -Wno-error=array-bounds \
            -Wno-error=enum-int-mismatch \
            -Wno-error=misleading-indentation \
            -Wno-error"
          
          make CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- KCFLAGS="$KCFLAGS" -j2 2>&1 | tee build.log
          
          if [ $? -ne 0 ]; then
            echo "=== Build Failed ==="
            tail -50 build.log
            exit 1
          fi
          
          echo "=== Kernel Compilation Complete ==="

      - name: Verify Build Output
        run: |
          if [ -f arch/arm64/boot/Image.gz-dtb ]; then
            ls -lh arch/arm64/boot/Image.gz-dtb
            echo "[✓] Image.gz-dtb found"
          else
            echo "[✗] Image.gz-dtb NOT found!"
            exit 1
          fi

      - name: Package Raw Bins
        run: |
          mkdir -p output_bins
          cp arch/arm64/boot/Image.gz-dtb ./output_bins/
          cp arch/arm64/boot/Image ./output_bins/ 2>/dev/null || true
          cp .config ./output_bins/kernel.config
          cd output_bins && zip -r9 ../NetHunter-Kernel-Gemini-Raw-Files.zip *

      - name: Upload Raw Kernel Zip
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-Kernel-Mi5-Raw-Files
          path: NetHunter-Kernel-Gemini-Raw-Files.zip
          retention-days: 30
