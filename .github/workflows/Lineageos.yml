name: Build NetHunter Kernel Mi5

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ARCH: arm64
      SUBARCH: arm64

    steps:

      ###########################################################
      # 1. Checkout Repositori Anda Sendiri (Untuk Mengakses ZIP Lokal)
      ###########################################################
      - name: Checkout User Repository
        uses: actions/checkout@v4

      ###########################################################
      # 2. Validasi Keberadaan Template ZIP Lokal Sebelum Memulai
      ###########################################################
      - name: Validate Local ZIP Template
        run: |
          echo "=== VALIDASI TEMPLATE ZIP ==="
          if [ -f "Gemini-MonitorKernel.zip" ]; then
            echo "[ OK ] Gemini-MonitorKernel.zip ditemukan di root repositori Anda."
            ls -lh Gemini-MonitorKernel.zip
          else
            echo "::error::[ FATAL ] Gemini-MonitorKernel.zip TIDAK ditemukan di root repositori Anda!"
            echo "Pastikan berkas ZIP tersebut sudah dicommit dan dipush ke cabang (branch) utama Anda."
            exit 1
          fi

      ###########################################################
      # 3. Checkout Source Kernel ke Sub-Folder Terisolasi
      ###########################################################
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_xiaomi_msm8996
          ref: lineage-22.2
          path: kernel

      ###########################################################
      # 4. Install Packages & Build Tools
      ###########################################################
      - name: Install Packages
        run: |
          sudo apt update
          sudo apt install -y \
            git bc bison flex build-essential libssl-dev libelf-dev \
            libncurses5-dev python3 unzip zip rsync curl wget cpio \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      ###########################################################
      # 5. Download & Cache AOSP Clang Toolchain
      ###########################################################
      - name: Cache AOSP Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/clang
          key: aosp-clang-r530567-v1

      - name: Download AOSP Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/clang
          cd $GITHUB_WORKSPACE/clang
          echo "Downloading Clang from Google Server..."
          curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r530567.tar.gz
          echo "Extracting Clang..."
          tar -xzf clang-r530567.tar.gz
          rm clang-r530567.tar.gz

      - name: Add Clang to PATH & Validate compiler
        run: |
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          echo "=== VERIFIKASI COMPILER ==="
          clang --version
          aarch64-linux-gnu-gcc --version

      ###########################################################
      # 6. Clone RTL8188EUS Aircrack (Di dalam folder kernel)
      ###########################################################
      - name: Clone RTL8188EUS
        working-directory: kernel
        run: |
          echo "=== INTEGRASI RTL8188EUS ==="
          rm -rf drivers/net/wireless/rtl8188eus

          git clone \
            --depth=1 \
            https://github.com/aircrack-ng/rtl8188eus.git \
            drivers/net/wireless/rtl8188eus

          if ! grep -q rtl8188eus drivers/net/wireless/Makefile; then
            echo 'obj-$(CONFIG_RTL8188EU) += rtl8188eus/' \
            >> drivers/net/wireless/Makefile
            echo "[ OK ] RTL8188EUS ditambahkan ke Makefile."
          fi

          if ! grep -q rtl8188eus drivers/net/wireless/Kconfig; then
            echo 'source "drivers/net/wireless/rtl8188eus/Kconfig"' \
            >> drivers/net/wireless/Kconfig
            echo "[ OK ] RTL8188EUS ditambahkan ke Kconfig."
          fi

      ###########################################################
      # 7. Hotfix: Patch Wireless Headers
      ###########################################################
      - name: Patch Wireless Headers
        working-directory: kernel
        run: |
          echo "=== PATCH LEGACY WIRELESS DEFINITIONS ==="
          
          cat << 'EOF' >> include/net/cfg80211.h

          /* NetHunter Fixes for Legacy Wireless Compile */
          #ifndef IEEE80211_BAND_2GHZ
          #define IEEE80211_BAND_2GHZ NL80211_BAND_2GHZ
          #endif
          #ifndef IEEE80211_BAND_5GHZ
          #define IEEE80211_BAND_5GHZ NL80211_BAND_5GHZ
          #endif
          #ifndef IEEE80211_BAND_60GHZ
          #define IEEE80211_BAND_60GHZ NL80211_BAND_60GHZ
          #endif
          #ifndef IEEE80211_NUM_BANDS
          #define IEEE80211_NUM_BANDS NUM_NL80211_BANDS
          #endif
          EOF
          echo "[ OK ] cfg80211.h berhasil di-patch."

      ###########################################################
      # 8. Detect Defconfig
      ###########################################################
      - name: Detect Defconfig
        working-directory: kernel
        run: |
          echo "=== MENDETEKSI DEFCONFIG ==="
          find arch -name "*defconfig"

          if [ -f arch/arm64/configs/vendor/xiaomi/mi8996_defconfig ]; then
            echo "DEFCONFIG=vendor/xiaomi/mi8996_defconfig" >> $GITHUB_ENV
            echo "[ OK ] Menggunakan vendor/xiaomi/mi8996_defconfig"
          elif [ -f arch/arm64/configs/gemini_defconfig ]; then
            echo "DEFCONFIG=gemini_defconfig" >> $GITHUB_ENV
            echo "[ OK ] Menggunakan gemini_defconfig"
          else
            echo "::error::[ FATAL ] Defconfig target tidak ditemukan!"
            exit 1
          fi

      ###########################################################
      # 9. Audit Source Tree
      ###########################################################
      - name: Audit Source Tree
        working-directory: kernel
        run: |
          echo "==============================="
          echo "Audit Versi Kernel"
          echo "==============================="
          make kernelversion

          echo
          echo "==============================="
          echo "Audit QCACLD & CNSS Drivers"
          echo "==============================="
          find drivers -iname "*qcacld*" || true
          find drivers -iname "*cnss*" || true

          echo
          echo "==============================="
          echo "Audit Driver Wireless Aktif"
          echo "==============================="
          ls -R drivers/net/wireless || true

          echo
          echo "==============================="
          echo "Audit Bluetooth Stack"
          echo "==============================="
          find net/bluetooth -name "Kconfig*"
          grep -R "RFCOMM" net/bluetooth || true
          grep -R "HIDP" net/bluetooth || true

          echo
          echo "==============================="
          echo "Audit USB ConfigFS & HID"
          echo "==============================="
          grep -R USB_CONFIGFS drivers include 2>/dev/null || true
          grep -R USB_F_HID drivers include 2>/dev/null || true

          echo
          echo "==============================="
          echo "Verifikasi Jalur Merge Config"
          echo "==============================="
          if [ -f scripts/kconfig/merge_config.sh ]; then
            echo "[ OK ] merge_config.sh ditemukan."
          else
            echo "::error::[ FATAL ] merge_config.sh tidak ditemukan di jalur standar!"
            exit 1
          fi

      ###########################################################
      # 10. Generate Default Config
      ###########################################################
      - name: Generate Default Config
        working-directory: kernel
        run: |
          echo "=== MEMBUAT BASE CONFIG ==="
          make O=out ARCH=arm64 ${DEFCONFIG}

          echo
          echo "=== BASE CONFIG PREVIEW ==="
          grep CONFIG_BT out/.config | head -15 || true
          grep CONFIG_CFG80211 out/.config || true
          grep CONFIG_MAC80211 out/.config || true

      ###########################################################
      # 11. Create NetHunter Config (Kunci Sukses Kconfig Fix)
      ###########################################################
      - name: Create NetHunter Config
        working-directory: kernel
        run: |
          echo "=== MENULIS NETHUNTER CONFIG ==="
          cat > nethunter.config <<'EOF'
          #######################################################
          ## Modules
          #######################################################
          CONFIG_MODULES=y
          CONFIG_MODULE_UNLOAD=y
          CONFIG_MODULE_FORCE_UNLOAD=y

          #######################################################
          ## Networking
          #######################################################
          CONFIG_PACKET=y
          CONFIG_UNIX=y
          CONFIG_NETFILTER=y
          CONFIG_CFG80211=y
          CONFIG_MAC80211=y

          #######################################################
          ## Qualcomm WLAN
          #######################################################
          CONFIG_QCA_CLD_WLAN=y

          #######################################################
          ## USB Gadget
          #######################################################
          CONFIG_USB_GADGET=y
          CONFIG_USB_LIBCOMPOSITE=y
          CONFIG_USB_CONFIGFS=y
          CONFIG_USB_CONFIGFS_SERIAL=y
          CONFIG_USB_CONFIGFS_ACM=y
          CONFIG_USB_CONFIGFS_RNDIS=y
          CONFIG_USB_CONFIGFS_MASS_STORAGE=y
          CONFIG_USB_CONFIGFS_F_HID=y
          CONFIG_USB_F_HID=y

          #######################################################
          ## Bluetooth
          #######################################################
          CONFIG_BT=y
          CONFIG_BT_BREDR=y
          CONFIG_BT_LE=y
          CONFIG_BT_BNEP=y
          CONFIG_BT_RFCOMM=m
          CONFIG_BT_HIDP=m
          CONFIG_BT_HCIBTUSB=m
          CONFIG_BT_HCIVHCI=m

          #######################################################
          ## USB Serial
          #######################################################
          CONFIG_USB_SERIAL=y
          CONFIG_USB_ACM=m
          CONFIG_USB_SERIAL_CP210X=m
          CONFIG_USB_SERIAL_CH341=m
          CONFIG_USB_SERIAL_FTDI_SIO=m
          CONFIG_USB_SERIAL_PL2303=m

          #######################################################
          ## WiFi Adapter & Structural Kconfig Dependencies
          #######################################################
          CONFIG_WLAN_VENDOR_ATH=y
          CONFIG_ATH_CARDS=y
          CONFIG_WLAN_VENDOR_MEDIATEK=y
          CONFIG_WLAN_VENDOR_REALTEK=y
          
          CONFIG_RTL8188EU=m
          CONFIG_RTL8192CU=m
          CONFIG_RTL8XXXU=m
          CONFIG_ATH9K_HTC=m
          CONFIG_MT7601U=m
          CONFIG_ZD1211RW=m

          #######################################################
          ## Virtual Interface
          #######################################################
          CONFIG_TUN=y
          CONFIG_VETH=y
          CONFIG_BRIDGE=y

          #######################################################
          ## CAN
          #######################################################
          CONFIG_CAN=y
          CONFIG_CAN_RAW=y
          CONFIG_CAN_GW=y
          CONFIG_CAN_VCAN=y
          CONFIG_CAN_SLCAN=y

          #######################################################
          ## Filesystem
          #######################################################
          CONFIG_FUSE_FS=y
          CONFIG_OVERLAY_FS=y
          CONFIG_CIFS=y
          CONFIG_NFS_FS=y
          CONFIG_NTFS_FS=y
          CONFIG_SQUASHFS=y
          EOF
          echo "[ OK ] nethunter.config berhasil dibuat dengan perbaikan dependensi induk lengkap."

      ###########################################################
      # 12. Merge Config
      ###########################################################
      - name: Merge NetHunter Config
        working-directory: kernel
        run: |
          echo "=== PROSES MERGE CONFIG ==="
          chmod +x scripts/kconfig/merge_config.sh

          scripts/kconfig/merge_config.sh \
            -m \
            -O out \
            out/.config \
            nethunter.config

          make O=out ARCH=arm64 olddefconfig

      ###########################################################
      # 13. Audit Final Config (Sistem Proteksi Kegagalan)
      ###########################################################
      - name: Audit NetHunter Config
        working-directory: kernel
        run: |
          echo "========================================="
          echo "VERIFIKASI AKHIR CONFIG SEBELUM BUILD"
          echo "========================================="

          STATUS=0

          check() {
            if grep -q "^$1=y" out/.config; then
                echo "[ OK ] $1=y"
            elif grep -q "^$1=m" out/.config; then
                echo "[ OK ] $1=m"
            else
                echo "::error::[ GAGAL ] Kunci Config Penting Hilang: $1"
                STATUS=1
            fi
          }

          check CONFIG_CFG80211
          check CONFIG_MAC80211
          check CONFIG_BT
          check CONFIG_BT_BREDR
          check CONFIG_BT_LE
          check CONFIG_BT_BNEP
          check CONFIG_BT_RFCOMM
          check CONFIG_BT_HIDP
          check CONFIG_USB_GADGET
          check CONFIG_USB_CONFIGFS
          check CONFIG_USB_CONFIGFS_F_HID
          check CONFIG_USB_F_HID
          check CONFIG_QCA_CLD_WLAN
          check CONFIG_RTL8188EU
          check CONFIG_RTL8192CU
          check CONFIG_RTL8XXXU
          check CONFIG_ATH9K_HTC
          check CONFIG_MT7601U
          check CONFIG_ZD1211RW
          check CONFIG_USB_SERIAL_CP210X
          check CONFIG_USB_SERIAL_CH341
          check CONFIG_USB_SERIAL_FTDI_SIO
          check CONFIG_USB_SERIAL_PL2303
          check CONFIG_TUN
          check CONFIG_VETH
          check CONFIG_BRIDGE
          check CONFIG_CAN
          check CONFIG_CAN_RAW
          check CONFIG_CAN_GW
          check CONFIG_CAN_VCAN
          check CONFIG_CAN_SLCAN
          check CONFIG_OVERLAY_FS
          check CONFIG_FUSE_FS
          check CONFIG_CIFS
          check CONFIG_NFS_FS
          check CONFIG_NTFS_FS
          check CONFIG_SQUASHFS

          if [ $STATUS -ne 0 ]; then
             echo "::error::[ FATAL ] Audit konfigurasi gagal. Beberapa fitur NetHunter penting tidak aktif!"
             exit 1
          fi
          echo "[ SUKSES ] Semua konfigurasi valid dan siap di-compile."

      ###########################################################
      # 14. Build Kernel (Menggunakan Clang & Pembatasan CPU)
      ###########################################################
      - name: Build Kernel Image
        working-directory: kernel
        run: |
          echo "=== MEMULAI KOMPILASI KERNEL ==="
          make -j2 O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            KCFLAGS="-w"

      ###########################################################
      # 15. Verifikasi Keberadaan & Integritas File Kernel Image
      ###########################################################
      - name: Verify Kernel Image
        working-directory: kernel
        run: |
          echo "=== VERIFIKASI OUTPUT KERNEL ==="
          find out/arch/arm64/boot -type f

          if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
              echo "[ OK ] Kernel Image.gz-dtb berhasil dibuat."
              ls -lh out/arch/arm64/boot/Image.gz-dtb
          elif [ -f out/arch/arm64/boot/Image.gz ]; then
              echo "[ WARN ] Hanya mendeteksi Image.gz tanpa DTB bawaan."
              ls -lh out/arch/arm64/boot/Image.gz
          elif [ -f out/arch/arm64/boot/Image ]; then
              echo "[ WARN ] Hanya mendeteksi Image mentah (uncompressed)."
              ls -lh out/arch/arm64/boot/Image
          else
              echo "::error::[ FATAL ] Gagal! Tidak ada file Image kernel yang terbuat!"
              exit 1
          fi

      ###########################################################
      # 16. Build Modules
      ###########################################################
      - name: Build Modules
        working-directory: kernel
        run: |
          echo "=== KOMPILASI MODUL DRIVER (*.ko) ==="
          make -j2 O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            KCFLAGS="-w" \
            modules

      ###########################################################
      # 17. Install & Validasi Modul Eksternal
      ###########################################################
      - name: Install Modules
        working-directory: kernel
        run: |
          echo "=== MEMASANG MODUL KERNEL ==="
          mkdir -p ../modules_out
          make O=out ARCH=arm64 INSTALL_MOD_PATH=../modules_out modules_install
          
          echo "=== BERKAS MODUL YANG BERHASIL DICOMPILE ==="
          find ../modules_out -name "*.ko"
          
          KO_COUNT=$(find ../modules_out -name "*.ko" | wc -l)
          if [ "$KO_COUNT" -eq 0 ]; then
             echo "::warning::[ PERINGATAN ] Tidak ada berkas modul .ko yang dibuat!"
          else
             echo "[ OK ] Ditemukan $KO_COUNT driver .ko siap pakai."
          fi

      ###########################################################
      # 18. Bongkar & Siapkan AnyKernel3 Template Milikmu
      ###########################################################
      - name: Prepare AnyKernel3 from Local Template
        run: |
          echo "=== MENGEKSTRAK TEMPLATE ZIP SUKSES ==="
          mkdir -p AnyKernel3
          unzip Gemini-MonitorKernel.zip -d AnyKernel3

          if [ ! -f AnyKernel3/anykernel.sh ]; then
             echo "::error::[ FATAL ] File anykernel.sh tidak ditemukan di dalam ZIP template Anda!"
             exit 1
          fi

          echo "=== MEMBERSIHKAN INTEGRASI LAMA ==="
          rm -f AnyKernel3/Image.gz-dtb AnyKernel3/Image.gz AnyKernel3/Image AnyKernel3/dtb AnyKernel3/dt.img
          rm -rf AnyKernel3/modules/*

          echo "=== MENYUNTIKKAN KERNEL BARU ==="
          if [ -f kernel/out/arch/arm64/boot/Image.gz-dtb ]; then
              cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
              echo "[ OK ] Image.gz-dtb berhasil disuntikkan."
          elif [ -f kernel/out/arch/arm64/boot/Image.gz ]; then
              cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/
              echo "[ OK ] Image.gz berhasil disuntikkan."
          fi

          echo "=== MENYUNTIKKAN MODUL BARU ==="
          if [ -d modules_out/lib/modules ]; then
              mkdir -p AnyKernel3/modules
              find modules_out/ -name "*.ko" -exec cp {} AnyKernel3/modules/ \;
              echo "[ OK ] Semua driver baru (*.ko) berhasil dimasukkan ke AnyKernel3/modules/."
              ls -l AnyKernel3/modules/
          fi

      ###########################################################
      # 19. Pack AnyKernel ZIP Baru
      ###########################################################
      - name: Pack AnyKernel ZIP
        run: |
          echo "=== MENGEMAS KEMBALI KERNEL NETHUNTER ZIP ==="
          cd AnyKernel3
          zip -r9 ../NetHunter-Mi5-Kernel-Fixed.zip *

      ###########################################################
      # 20. Build Summary & Validasi Akhir Berkas ZIP
      ###########################################################
      - name: Build Summary
        run: |
          echo "============================================="
          echo "       LAPORAN AKHIR KOMPILASI KERNEL        "
          echo "============================================="
          echo
          echo "Ukuran File Flashable ZIP Akhir:"
          if [ -f NetHunter-Mi5-Kernel-Fixed.zip ]; then
             ls -lh NetHunter-Mi5-Kernel-Fixed.zip
             echo "[ SUKSES ] Berkas zip berhasil diproduksi."
          else
             echo "::error::[ FATAL ] Berkas zip gagal dibuat pada langkah akhir!"
             exit 1
          fi
          echo
          echo "Modul yang disuntikkan ke dalam ZIP:"
          unzip -l NetHunter-Mi5-Kernel-Fixed.zip | grep -i "modules/" || echo "Tidak ada modul."

      ###########################################################
      # 21. Upload Artifact Hasil Build
      ###########################################################
      - name: Upload Kernel ZIP
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-Mi5-Kernel
          path: NetHunter-Mi5-Kernel-Fixed.zip

      - name: Upload Build Config
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Config
          path: kernel/out/.config
