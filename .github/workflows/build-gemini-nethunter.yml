name: Build Xiaomi Gemini NetHunter Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install packages
      run: |
        sudo apt update
        sudo apt install -y \
          git bc bison flex \
          build-essential \
          libssl-dev \
          libelf-dev \
          libncurses5-dev \
          python3

    - name: Install GCC
      run: |
        sudo apt install -y \
          gcc-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi

    - name: Install Clang
      run: |
        sudo apt install -y clang lld

    - name: Kernel Config
      run: |
        export ARCH=arm64
        make vendor/xiaomi/mi8996_defconfig

    - name: Apply NetHunter patches
      run: |
        chmod +x scripts/patch-nethunter.sh
        ./scripts/patch-nethunter.sh

    - name: Build Kernel
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CC=clang

        make -j$(nproc)

    - name: Upload Image
      uses: actions/upload-artifact@v4
      with:
        name: Kernel
        path: |
          arch/arm64/boot/Image.gz-dtb
          arch/arm64/boot/dtbo.img
